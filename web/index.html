<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gemini Live Voice Bot</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --panel: #1f2937;
      --txt: #f9fafb;
      --muted: #9ca3af;
      --primary: #2563eb;
      --danger: #dc2626;
      --border: #374151;
    }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--txt);
    }
    .container {
      max-width: 860px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 { margin: 0 0 10px; font-size: 1.4rem; }
    p { color: var(--muted); margin-top: 0; }
    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      cursor: pointer;
      color: white;
      background: var(--primary);
    }
    button.secondary { background: #4b5563; }
    button.danger { background: var(--danger); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    input {
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #111827;
      color: var(--txt);
      padding: 10px;
      flex: 1;
      min-width: 220px;
    }
    #status {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.85rem;
      background: #374151;
    }
    #log {
      margin: 0;
      max-height: 360px;
      overflow: auto;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 0.92rem;
      background: #0b1220;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Gemini Live Voice Bot</h1>
      <p>Real-time mic streaming to Gemini Live and streamed voice response playback.</p>
      <div class="row">
        <button id="connectBtn">Connect</button>
        <button id="startBtn" class="secondary" disabled>Start Talking</button>
        <button id="stopBtn" class="danger" disabled>Stop Talking</button>
        <span id="status">Disconnected</span>
      </div>
      <div class="row">
        <input id="textInput" placeholder="Type a message and press Send" />
        <button id="sendBtn" class="secondary" disabled>Send</button>
      </div>
    </div>

    <div class="card">
      <h3>Live Log</h3>
      <pre id="log"></pre>
    </div>
  </div>

  <script type="module" src="/web/app.js"></script>
</body>
</html>
