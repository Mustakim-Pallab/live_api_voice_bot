services:
  voice-bot:
    build: .
    container_name: gemini-live-voice-bot
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-3.1-flash-live-preview
      HOST: 0.0.0.0
      PORT: 8000
      INPUT_AUDIO_RATE: 16000
      OUTPUT_AUDIO_RATE: 24000
      VOICE_NAME: Aoede
    restart: unless-stopped

